name: Automated Test For Lowest Number

on:
  push:

jobs:
  run-tests:
    name: Run Lowest Number Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Test 1 – 10 numbers
        run: |
          python3 find_lowest_number.py test_data/test1Input.txt test1Output.txt
          diff test1Output.txt test_data/test1Expected.txt

      - name: Test 2 – single number
        run: |
          python3 find_lowest_number.py test_data/test2Input.txt test2Output.txt
          diff test2Output.txt test_data/test2Expected.txt

      - name: Test 3 – blank file
        run: |
          python3 find_lowest_number.py test_data/test3Input.txt test3Output.txt
          diff test3Output.txt test_data/test3Expected.txt
